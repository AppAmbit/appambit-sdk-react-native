buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['Appambit_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["Appambit_" + name]).toInteger()
}

android {
  namespace "com.appambit"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
    }
  }
}

repositories {
  mavenCentral()
  google()
  flatDir {
    dirs "libs"
  }
}

def kotlin_version = getExtOrDefault("kotlinVersion")

// Local AAR build of appambit-sdk-android (e.g. with unreleased Database support), checked
// into libs/ so it works without consumers cloning the sibling appambit-sdk-android repo.
// Falls back to the published Maven artifact if the AAR isn't present.
// To regenerate: ./gradlew :appambit-sdk:assembleRelease (in appambit-sdk-android), then copy
// appambit-sdk/build/outputs/aar/appambit-sdk-release.aar to android/libs/appambit-sdk-local.aar
def localAar = file("libs/appambit-sdk-local.aar")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

  if (localAar.exists()) {
    implementation(name: "appambit-sdk-local", ext: "aar")
    // flatDir AARs carry no POM, so the SDK's own dependencies must be declared here.
    implementation("androidx.appcompat:appcompat:1.7.1")
    implementation("com.google.android.material:material:1.12.0")
  } else {
    implementation("com.appambit:appambit:1.0.2")
  }

  // Local development: consumer app's settings.gradle can also use includeBuild to add the
  // Android SDK as a composite build with a dependencySubstitution rule that redirects this
  // artifact to the local :appambit-sdk project, taking precedence over both options above.
}
